<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Full favicon set generated from the current gold invariant mark.
         .ico carries 16/32/48 multi-size for legacy browsers; dedicated
         PNGs cover modern Chrome / Safari / Android / iOS. -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#041a2f" />

    <!-- Day 91 (Sasha 2026-06-09): pre-paint theme apply. Without this,
         a user who persisted the Aurum dark theme paints the Lapis light
         register first and flips dark only after React mounts: a white
         flash on every load. Runs before any stylesheet paints. Keep the
         legacy-slug migration map in sync with SkinContext.tsx
         (LEGACY_SKIN_MIGRATIONS). Route-prefix scopes (/aurum, /ns, ...)
         are applied later, synchronously at App.tsx module load, and
         override this for demo URLs. -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("app-skin");
          if (s === "darktheme") s = "aurum";
          if (s === "aurora") s = "lapis";
          var valid = ["lapis", "navy-gold", "network-school", "karime", "daouniverse", "planetir", "aurum", "techstars"];
          if (s && valid.indexOf(s) !== -1) {
            document.documentElement.setAttribute("data-skin", s);
          }
        } catch (e) { /* private mode etc. - default register applies */ }
      })();
    </script>

    <title>Find Your Top Talent. Productize It. Find Your People.</title>
    <meta name="description" content="Coordination infrastructure for conscious innovation. From individual genius to ventures to federated communities. Open-source, forkable." />
    <meta name="author" content="Alexander Konstantinov" />

    <!-- Day 65 (Sasha 2026-05-14): canonical link removed from index.html.
         Per-route canonicals are owned by the <SEO> component
         (src/components/SEO.tsx) via react-helmet-async; keeping a static
         canonical here would ship two <link rel="canonical"> tags on
         every Helmet-using route (invalid SEO). -->

    <meta property="og:title" content="Find Your Top Talent. Productize It. Find Your People." />
    <meta property="og:description" content="Coordination infrastructure for conscious innovation. From individual genius to ventures to federated communities. Open-source, forkable." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://findyourtoptalent.com/opengraph-image-v3.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Find Your Top Talent. Productize It. Find Your People." />
    <meta property="og:url" content="https://findyourtoptalent.com/" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@integralall" />
    <meta name="twitter:creator" content="@integralall" />
    <meta name="twitter:title" content="Find Your Top Talent. Productize It. Find Your People." />
    <meta name="twitter:description" content="Coordination infrastructure for conscious innovation. From individual genius to ventures to federated communities. Open-source, forkable." />
    <meta name="twitter:image" content="https://findyourtoptalent.com/opengraph-image-v3.png" />
    <meta name="twitter:image:alt" content="Find Your Top Talent. Productize It. Find Your People." />

    <!-- Organization + WebSite JSON-LD: sitewide identity. Per-page
         Article/Service/Person schema is injected by <SEO>. -->
    <script type="application/ld+json">
      {"@context":"https://schema.org","@type":"Organization","name":"Find Your Top Talent","url":"https://findyourtoptalent.com","founder":{"@type":"Person","name":"Alexander Konstantinov","sameAs":["https://t.me/integralevolution","https://www.youtube.com/@IntegralEvolution"]},"logo":"https://findyourtoptalent.com/apple-touch-icon.png"}
    </script>
    <script type="application/ld+json">
      {"@context":"https://schema.org","@type":"WebSite","name":"Find Your Top Talent","url":"https://findyourtoptalent.com","potentialAction":{"@type":"SearchAction","target":"https://findyourtoptalent.com/?q={search_term_string}","query-input":"required name=search_term_string"}}
    </script>
    
    <!-- Google Fonts: Cormorant Garamond (inscribed/etched headlines) + DM Sans (minimal body) + Poppins + Source Serif 4 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Poppins:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">

    <!-- Day 62 (Sasha 2026-05-05): responsiveness pass — early hints for
         third-party origins hit during initial page life. The browser
         starts the DNS+TLS handshake in parallel with HTML/JS parsing
         instead of serially when the request actually fires, saving
         100-300ms on the first request to each origin. -->

    <!-- Supabase: auth.getSession() and the post-auth listener fire on
         App mount. `crossorigin` because Supabase fetches with
         credentials (auth headers + cookies for RLS). -->
    <link rel="preconnect" href="https://jypjttotvastdhanwvrx.supabase.co" crossorigin>

    <!-- SoundCloud Widget API: loaded by SoundCloudPlayerProvider
         when the user enters a music-allowed route (`/`, `/game/*`,
         `/ai-os/*`, etc.). No `crossorigin` because the widget JS is
         fetched same-origin INSIDE the iframe, not by our parent
         document. -->
    <link rel="preconnect" href="https://w.soundcloud.com">

    <!-- DNS-only prefetch (cheaper than full preconnect — DNS only,
         no TCP/TLS) for SC origins that may be hit later: media
         stream + artwork CDN. -->
    <link rel="dns-prefetch" href="https://api-widget.soundcloud.com">
    <link rel="dns-prefetch" href="https://i1.sndcdn.com">

    <!-- Mux: HLS video background mounted by GameShellV2 (renders on
         /, /ai-os, /game/*, etc. — every shell-rendering route). The
         hls.js library (~80KB) is dynamically imported AFTER React
         mounts, then fetches the manifest from stream.mux.com, then
         segments from cdn.mux.com. Preconnect saves the handshake on
         each leg of that chain. -->
    <link rel="preconnect" href="https://stream.mux.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.mux.com">
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
