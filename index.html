  <body>
    <div id="root"></div>
    <!-- Day 54 r12 (Sasha 2026-04-28): pre-React diagnostic.
         Activated by `?debug=1`. Sets up error / lifecycle listeners
         BEFORE the React bundle starts loading, so it survives even
         when the page dies in 0.1s before AiOsPage can mount. Persists
         every event to localStorage so the breadcrumb survives the
         crash — on the next visit, the overlay shows what fired in
         the previous session before death. Renders an overlay panel
         via raw DOM so it doesn't depend on React being alive. Zero
         impact when ?debug is absent: the IIFE early-returns. -->
    <script>
    (function(){
      try {
        if (location.search.indexOf('debug=1') === -1) return;
        var KEY = '__aios_dbg', start = Date.now(), log = [];
        try { log = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e){}
        var box;
        function paint() {
          if (!document.body) return;
          if (!box) {
            box = document.createElement('div');
            box.id = '__aios_dbg_panel';
            box.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999999;background:rgba(0,0,0,0.92);color:#0f0;font:10px/1.35 ui-monospace,Menlo,monospace;padding:8px 10px;max-height:50vh;overflow:auto;white-space:pre-wrap;word-break:break-all;pointer-events:none';
            document.body.appendChild(box);
          }
          box.textContent = log.join('\n');
        }
        function add(m) {
          var t = ((Date.now() - start) / 1000).toFixed(2);
          log.push('[' + t + 's] ' + m);
          if (log.length > 100) log = log.slice(-100);
          try { localStorage.setItem(KEY, JSON.stringify(log)); } catch(e){}
          paint();
        }
        if (log.length) {
          log.push('=== prev session ended above ===');
          log.push('=== new session start ' + new Date().toISOString() + ' ===');
        }
        add('init path=' + location.pathname + ' vp=' + window.innerWidth + 'x' + window.innerHeight + ' dpr=' + window.devicePixelRatio);
        add('ua=' + navigator.userAgent.slice(0, 120));
        window.addEventListener('error', function(e){
          add('ERR ' + (e.message || '').slice(0, 130) + ' @ ' + ((e.filename || '').split('/').pop() || '?') + ':' + (e.lineno || '?'));
        });
        window.addEventListener('unhandledrejection', function(e){
          add('REJ ' + String(e.reason).slice(0, 150));
        });
        document.addEventListener('visibilitychange', function(){
          add('vis:' + document.visibilityState);
        });
        window.addEventListener('pagehide', function(e){
          add('pagehide persisted=' + e.persisted);
        });
        window.addEventListener('pageshow', function(){
          add('pageshow');
        });
        // Mark when DOMContentLoaded fires (HTML parsed)
        document.addEventListener('DOMContentLoaded', function(){ add('DOMContentLoaded'); paint(); });
        // Mark when load fires (all resources)
        window.addEventListener('load', function(){ add('window.load'); });
        var n = 0;
        setInterval(function(){ n++; add('beat ' + n); }, 1000);
        if (document.readyState !== 'loading') paint();
      } catch (err) {
        // Diagnostic itself must never crash the page
        try { console.error('[aios-dbg] init failed', err); } catch(e){}
      }
    })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
