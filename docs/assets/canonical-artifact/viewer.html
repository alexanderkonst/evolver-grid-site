<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canonical Artifact v1</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #fffefa;
      }

      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import * as THREE from "/node_modules/three/build/three.module.js";

      const params = new URLSearchParams(window.location.search);
      const mode = params.get("mode") || "artifact";
      const isAnatomy = mode === "anatomy";
      const motion = params.get("motion") || "v1";
      const isMetabolicMotion = motion === "metabolic";
      const isImplicitMotion = motion === "implicit";
      const quality = params.get("quality") || "standard";
      const isPhysicalQuality = quality === "physical";
      const model = await fetch("/docs/assets/canonical-artifact/geometry/canonical-artifact.model.json").then((response) => response.json());
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0xfffefa);

      const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.01, 100);
      camera.position.set(2.75, -3.2, 2.05);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = isPhysicalQuality ? 0.96 : 1.08;
      document.body.appendChild(renderer.domElement);

      function makeEnvironmentTexture() {
        const canvas = document.createElement("canvas");
        canvas.width = 1024;
        canvas.height = 512;
        const ctx = canvas.getContext("2d");
        const sky = ctx.createLinearGradient(0, 0, 0, 512);
        sky.addColorStop(0, "#ffffff");
        sky.addColorStop(0.22, "#f7f3e8");
        sky.addColorStop(0.55, "#d7eef0");
        sky.addColorStop(0.78, "#f6df9d");
        sky.addColorStop(1, "#fffefa");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, 1024, 512);
        const bands = [
          [130, 112, 360, 58, "rgba(255,255,255,0.72)"],
          [620, 118, 290, 42, "rgba(255,236,172,0.58)"],
          [460, 286, 420, 70, "rgba(170,215,225,0.34)"],
          [28, 330, 310, 52, "rgba(196,176,215,0.22)"],
        ];
        for (const [x, y, w, h, color] of bands) {
          const gradient = ctx.createRadialGradient(x + w * 0.5, y + h * 0.5, 4, x + w * 0.5, y + h * 0.5, w * 0.55);
          gradient.addColorStop(0, color);
          gradient.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = gradient;
          ctx.fillRect(x, y, w, h);
        }
        const texture = new THREE.CanvasTexture(canvas);
        texture.mapping = THREE.EquirectangularReflectionMapping;
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.needsUpdate = true;
        return texture;
      }

      if (isPhysicalQuality) {
        scene.environment = makeEnvironmentTexture();
      }

      const ambient = new THREE.HemisphereLight(0xffffff, 0xe8d6ad, 1.55);
      scene.add(ambient);

      const key = new THREE.DirectionalLight(0xffffff, 2.5);
      key.position.set(3.5, -4.5, 5.5);
      scene.add(key);

      const fill = new THREE.DirectionalLight(0xd7efff, 0.82);
      fill.position.set(-3, 2, 2);
      scene.add(fill);

      const warm = new THREE.PointLight(0xffe29b, 3.5, 6.5, 1.5);
      warm.position.set(0, 0, 0);
      scene.add(warm);

      const vertices = new Map(model.sourceModel.vertices.map((vertex) => [vertex.id, new THREE.Vector3(...vertex.p)]));
      const group = new THREE.Group();
      scene.add(group);

      function makeBrushedTexture() {
        let seed = 137;
        const random = () => {
          seed = (seed * 16807) % 2147483647;
          return (seed - 1) / 2147483646;
        };
        const canvas = document.createElement("canvas");
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext("2d");
        const gradient = ctx.createLinearGradient(0, 0, 512, 512);
        gradient.addColorStop(0, "#c6a458");
        gradient.addColorStop(0.34, "#ecd184");
        gradient.addColorStop(0.55, "#fff1ae");
        gradient.addColorStop(0.78, "#d1ad5e");
        gradient.addColorStop(1, "#a9863f");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 512, 512);
        for (let y = 0; y < 512; y += 2) {
          const alpha = 0.035 + ((y % 17) / 17) * 0.055;
          ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
          ctx.beginPath();
          ctx.moveTo(0, y + Math.sin(y * 0.03) * 1.4);
          ctx.lineTo(512, y + Math.cos(y * 0.025) * 1.4);
          ctx.stroke();
        }
        for (let i = 0; i < 700; i += 1) {
          const x = random() * 512;
          const y = random() * 512;
          const v = 182 + random() * 58;
          ctx.fillStyle = `rgba(${v},${v * 0.9},${v * 0.56},0.034)`;
          ctx.fillRect(x, y, 1.1, 1.1);
        }
        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(3, 1);
        texture.colorSpace = THREE.SRGBColorSpace;
        return texture;
      }

      function makeAnisotropyTexture() {
        const canvas = document.createElement("canvas");
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext("2d");
        for (let y = 0; y < 512; y += 1) {
          for (let x = 0; x < 512; x += 1) {
            const wave = Math.sin((x + y * 0.22) * 0.045) * 0.5 + 0.5;
            const strength = 160 + wave * 82;
            ctx.fillStyle = `rgb(${strength},${128 + wave * 42},${205 + wave * 38})`;
            ctx.fillRect(x, y, 1, 1);
          }
        }
        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.RepeatWrapping;
        texture.repeat.set(4, 1);
        texture.colorSpace = THREE.SRGBColorSpace;
        return texture;
      }

      const brushedTexture = makeBrushedTexture();
      const anisotropyTexture = makeAnisotropyTexture();

      const alloyMaterial = new THREE.MeshPhysicalMaterial({
        color: isPhysicalQuality ? 0xd9bf78 : 0xd6b565,
        map: brushedTexture,
        roughnessMap: isPhysicalQuality ? brushedTexture : null,
        anisotropyMap: isPhysicalQuality ? anisotropyTexture : null,
        metalness: isAnatomy ? (isPhysicalQuality ? 0.78 : 0.62) : 0.76,
        roughness: isAnatomy ? (isPhysicalQuality ? 0.27 : 0.36) : 0.29,
        clearcoat: isAnatomy ? (isPhysicalQuality ? 0.62 : 0.44) : 0.68,
        clearcoatRoughness: isAnatomy ? (isPhysicalQuality ? 0.18 : 0.28) : 0.2,
        anisotropy: isPhysicalQuality ? 0.82 : 0,
        anisotropyRotation: Math.PI * 0.18,
        iridescence: isPhysicalQuality ? 0.18 : 0,
        iridescenceIOR: 1.42,
        iridescenceThicknessRange: [120, 310],
        envMapIntensity: isPhysicalQuality ? 0.92 : 1,
        emissive: 0x4b3510,
        emissiveIntensity: isAnatomy ? (isPhysicalQuality ? 0.01 : 0.025) : 0.055,
        transparent: isAnatomy,
        opacity: isAnatomy ? 0.68 : 1,
      });

      const axisMaterial = new THREE.MeshPhysicalMaterial({
        color: 0xf5dd8f,
        metalness: isAnatomy ? 0.1 : 0.22,
        roughness: isAnatomy ? (isPhysicalQuality ? 0.07 : 0.1) : 0.12,
        transmission: isAnatomy ? (isPhysicalQuality ? 0.5 : 0.36) : 0.24,
        thickness: isPhysicalQuality ? 0.48 : 0.3,
        ior: 1.62,
        dispersion: isPhysicalQuality ? 0.22 : 0,
        clearcoat: isAnatomy ? 0.92 : 0.84,
        clearcoatRoughness: 0.16,
        iridescence: isPhysicalQuality ? 0.28 : 0,
        iridescenceIOR: 1.36,
        iridescenceThicknessRange: [160, 420],
        envMapIntensity: isPhysicalQuality ? 1.34 : 1,
        emissive: 0xffeeb4,
        emissiveIntensity: isAnatomy ? (isPhysicalQuality ? 0.46 : 0.58) : 0.34,
      });

      const glowMaterial = new THREE.MeshBasicMaterial({
        color: 0xfff7c6,
        transparent: true,
        opacity: isAnatomy ? 0.035 : 0.055,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });

      const fieldMaterial = new THREE.ShaderMaterial({
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: false,
        uniforms: {
          time: { value: 0 },
          metabolism: { value: isMetabolicMotion || isImplicitMotion ? 1 : 0 },
          implicitness: { value: isImplicitMotion ? 1 : 0 },
          physicality: { value: isPhysicalQuality ? 1 : 0 },
          colorA: { value: new THREE.Color(0xc8b7d8) },
          colorB: { value: new THREE.Color(0xa7cbd4) },
          colorC: { value: new THREE.Color(0xf7f4e3) },
        },
        vertexShader: `
          varying vec3 vNormal;
          varying vec3 vWorldPosition;
          void main() {
            vec4 world = modelMatrix * vec4(position, 1.0);
            vWorldPosition = world.xyz;
            vNormal = normalize(mat3(modelMatrix) * normal);
            gl_Position = projectionMatrix * viewMatrix * world;
          }
        `,
        fragmentShader: `
          uniform float time;
          uniform float metabolism;
          uniform float implicitness;
          uniform float physicality;
          uniform vec3 colorA;
          uniform vec3 colorB;
          uniform vec3 colorC;
          varying vec3 vNormal;
          varying vec3 vWorldPosition;
          void main() {
            vec3 viewDirection = normalize(cameraPosition - vWorldPosition);
            float fresnel = pow(1.0 - abs(dot(normalize(vNormal), viewDirection)), 2.4);
            float waveA = sin((vWorldPosition.x * 3.1 + vWorldPosition.y * 2.3 + vWorldPosition.z * 2.7) + time * 0.9);
            float waveB = sin(length(vWorldPosition.xy) * 9.0 - time * 1.25 + vWorldPosition.z * 2.0);
            float angle = atan(vWorldPosition.y, vWorldPosition.x);
            float radial = length(vWorldPosition.xy);
            float propagation = sin(angle * 3.0 + radial * 12.0 - time * 1.95 + vWorldPosition.z * 5.2);
            float caustic = pow(propagation * 0.5 + 0.5, 7.0);
            float band = mix(waveA, (waveA * 0.55 + waveB * 0.45), metabolism) * 0.5 + 0.5;
            band = mix(band, band * 0.68 + caustic * 0.32, implicitness);
            vec3 iridescence = mix(colorA, colorB, band);
            float thinFilm = pow(fresnel, 1.4) * (0.24 + caustic * 0.28);
            iridescence = mix(iridescence, colorC, 0.38 + caustic * implicitness * 0.22);
            iridescence = mix(iridescence, vec3(0.94, 0.98, 1.0), thinFilm * physicality);
            float modeScale = ${isAnatomy ? "0.48" : "1.0"};
            float alpha = (0.018 + fresnel * (0.095 + physicality * 0.028) + band * 0.01 + caustic * implicitness * 0.044) * modeScale;
            gl_FragColor = vec4(iridescence, alpha);
          }
        `,
      });

      function tubeBetween(a, b, radius, material, radialSegments = 32) {
        const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
        const direction = new THREE.Vector3().subVectors(b, a);
        const length = direction.length();
        const geometry = new THREE.CylinderGeometry(radius, radius, length, radialSegments, 1, false);
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(mid);
        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.clone().normalize());
        return mesh;
      }

      for (const [aId, bId] of model.sourceModel.edges) {
        const a = vertices.get(aId);
        const b = vertices.get(bId);
        group.add(tubeBetween(a, b, isAnatomy ? 0.01 : 0.017, alloyMaterial, 24));
      }

      for (const [aId, bId] of model.sourceModel.coherenceAxes) {
        const a = vertices.get(aId);
        const b = vertices.get(bId);
        if (isAnatomy) {
          group.add(tubeBetween(a, b, 0.038, glowMaterial, 36));
          group.add(tubeBetween(a, b, 0.018, axisMaterial, 36));
        } else {
          group.add(tubeBetween(a, b, 0.031, axisMaterial, 36));
          group.add(tubeBetween(a, b, 0.067, glowMaterial, 36));
        }
      }

      for (const vertex of vertices.values()) {
        const joint = new THREE.Mesh(new THREE.SphereGeometry(isAnatomy ? 0.036 : 0.054, 40, 24), alloyMaterial);
        joint.position.copy(vertex);
        group.add(joint);
      }

      const singularity = new THREE.Mesh(
        new THREE.SphereGeometry(0.035, 48, 24),
        new THREE.MeshBasicMaterial({ color: 0xfffdf0 })
      );
      group.add(singularity);

      const singularityAura = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 48, 24),
        new THREE.MeshBasicMaterial({ color: 0xfff3b0, transparent: true, opacity: 0.06, blending: THREE.AdditiveBlending, depthWrite: false })
      );
      group.add(singularityAura);

      const field = new THREE.Mesh(new THREE.SphereGeometry(1.015, 96, 48), fieldMaterial);
      group.add(field);

      if (isPhysicalQuality) {
        const refractiveField = new THREE.Mesh(
          new THREE.SphereGeometry(1.012, 128, 64),
          new THREE.MeshPhysicalMaterial({
            color: 0xf8fbff,
            transparent: true,
            opacity: isAnatomy ? 0.12 : 0.2,
            transmission: 0.72,
            thickness: 0.18,
            ior: 1.24,
            dispersion: 0.28,
            roughness: 0.03,
            metalness: 0,
            iridescence: 0.62,
            iridescenceIOR: 1.22,
            iridescenceThicknessRange: [80, 260],
            clearcoat: 0.7,
            clearcoatRoughness: 0.08,
            envMapIntensity: 0.7,
            depthWrite: false,
            side: THREE.DoubleSide,
          })
        );
        group.add(refractiveField);
      }

      const torusGroup = new THREE.Group();
      group.add(torusGroup);
      const circulationPaths = [];

      const torusMaterial = new THREE.MeshBasicMaterial({
        color: 0xffe9a6,
        transparent: true,
        opacity: isAnatomy ? (isImplicitMotion ? 0.014 : 0.18) : 0.035,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });

      function addCirculationPath(rotation, scaleY = 0.42, radius = 0.98) {
        const points = [];
        for (let i = 0; i <= 240; i += 1) {
          const t = (i / 240) * Math.PI * 2;
          const r = radius + Math.sin(t * 3) * 0.025;
          points.push(new THREE.Vector3(Math.cos(t) * r, Math.sin(t) * r * scaleY, Math.sin(t * 2) * 0.08));
        }
        const curve = new THREE.CatmullRomCurve3(points, true, "catmullrom", 0.5);
        const mesh = new THREE.Mesh(new THREE.TubeGeometry(curve, 240, isAnatomy ? 0.0038 : 0.002, 8, true), torusMaterial);
        mesh.rotation.set(rotation[0], rotation[1], rotation[2]);
        torusGroup.add(mesh);
        circulationPaths.push({
          mesh,
          baseRotation: new THREE.Euler(rotation[0], rotation[1], rotation[2]),
          phase: circulationPaths.length * Math.PI * 0.67,
        });
      }

      addCirculationPath([0.2, 0.2, 0.0], 0.36, 1.02);
      addCirculationPath([1.15, 0.45, 0.8], 0.32, 1.0);
      addCirculationPath([-0.75, 0.35, -0.7], 0.38, 0.98);

      const fieldRingMaterial = new THREE.MeshBasicMaterial({
        color: 0xc9e2ea,
        transparent: true,
        opacity: isImplicitMotion ? 0.035 : 0.09,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      });
      const ring = new THREE.Mesh(new THREE.TorusGeometry(1.01, 0.0035, 8, 192), fieldRingMaterial);
      ring.rotation.x = Math.PI * 0.5;
      group.add(ring);

      const cameraDirection = new THREE.Vector3(2.75, -3.2, 2.05).normalize();

      const resize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        const distance = camera.aspect < 0.74 ? (isAnatomy ? 7.65 : 7.35) : (isAnatomy ? (isPhysicalQuality ? 5.18 : 5.05) : 4.85);
        camera.position.copy(cameraDirection.clone().multiplyScalar(distance));
        camera.lookAt(0, 0, 0);
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      };
      window.addEventListener("resize", resize);
      resize();

      function renderAt(ms) {
        const t = ms * 0.00018;
        const slow = ms * 0.001;
        fieldMaterial.uniforms.time.value = slow;
        field.rotation.y = isMetabolicMotion || isImplicitMotion ? Math.sin(slow * 0.16) * 0.035 : t;
        field.rotation.x = Math.sin(t * 0.7) * (isMetabolicMotion || isImplicitMotion ? 0.025 : 0.08);
        ring.rotation.z = isImplicitMotion ? Math.sin(slow * 0.32) * 0.08 : (isMetabolicMotion ? Math.sin(slow * 0.22) * 0.18 : t * 1.8);
        if (isMetabolicMotion || isImplicitMotion) {
          torusGroup.rotation.y = Math.sin(slow * 0.2) * (isImplicitMotion ? 0.035 : 0.08);
          torusGroup.rotation.z = Math.sin(slow * 0.17) * (isImplicitMotion ? 0.02 : 0.045);
          for (const path of circulationPaths) {
            const phase = slow * 0.85 + path.phase;
            path.mesh.rotation.x = path.baseRotation.x + Math.sin(phase) * (isImplicitMotion ? 0.025 : 0.08);
            path.mesh.rotation.y = path.baseRotation.y + Math.cos(phase * 0.8) * (isImplicitMotion ? 0.02 : 0.06);
            path.mesh.rotation.z = path.baseRotation.z + Math.sin(phase * 0.55) * (isImplicitMotion ? 0.025 : 0.08);
            path.mesh.scale.setScalar(1 + Math.sin(phase * 1.3) * (isImplicitMotion ? 0.012 : 0.025));
          }
          torusMaterial.opacity = isAnatomy
            ? (isImplicitMotion ? 0.006 + (Math.sin(slow * 1.4) * 0.5 + 0.5) * 0.012 : 0.115 + (Math.sin(slow * 1.1) * 0.5 + 0.5) * 0.055)
            : 0.035;
          fieldRingMaterial.opacity = isImplicitMotion ? 0.026 + (Math.sin(slow * 1.2) * 0.5 + 0.5) * 0.022 : 0.09;
          axisMaterial.emissiveIntensity = isAnatomy ? 0.46 + (Math.sin(slow * 0.85) * 0.5 + 0.5) * (isImplicitMotion ? 0.18 : 0.12) : 0.34;
          glowMaterial.opacity = isAnatomy ? 0.026 + (Math.sin(slow * 0.7) * 0.5 + 0.5) * (isImplicitMotion ? 0.024 : 0.018) : 0.055;
          warm.intensity = 3.0 + (Math.sin(slow * 0.55) * 0.5 + 0.5) * (isImplicitMotion ? 0.85 : 0.55);
        } else {
          torusGroup.rotation.y = t * 1.4;
          torusGroup.rotation.z = Math.sin(t * 0.9) * 0.08;
        }
        singularityAura.scale.setScalar(1 + Math.sin(t * 8) * (isMetabolicMotion || isImplicitMotion ? 0.022 : 0.04));
        renderer.render(scene, camera);
      }

      window.__setArtifactTime = (ms) => {
        renderAt(ms);
      };

      function animate() {
        renderAt(performance.now());
        requestAnimationFrame(animate);
      }

      renderer.render(scene, camera);
      window.__artifactReady = true;
      animate();
    </script>
  </body>
</html>
