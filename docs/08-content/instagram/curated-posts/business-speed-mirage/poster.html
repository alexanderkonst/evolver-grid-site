<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    @font-face {
      font-family: "Cormorant";
      src: url("../../../../../public/fonts/CormorantGaramond-Regular.ttf");
    }
    @font-face {
      font-family: "Cormorant";
      src: url("../../../../../public/fonts/CormorantGaramond-Bold.ttf");
      font-weight: 700;
    }
    @font-face {
      font-family: "Source";
      src: url("../../../../../public/fonts/SourceSerif4-Regular.ttf");
    }

    * { box-sizing: border-box; }

    html, body {
      width: 1080px;
      height: 1350px;
      margin: 0;
      overflow: hidden;
      background: #020407;
    }

    .poster {
      position: relative;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      color: #f5f0e7;
      background: #020407;
    }

    .art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .veil {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0, 2, 5, .12) 0%, rgba(0, 2, 5, .03) 50%, rgba(0, 2, 5, .16) 100%),
        radial-gradient(circle at 82% 14%, rgba(31, 66, 107, .10), transparent 30%);
    }

    .copy {
      position: absolute;
      z-index: 2;
      top: 78px;
      left: 82px;
      right: 82px;
    }

    .eyebrow {
      display: none;
    }

    h1 {
      width: 870px;
      margin: 0;
      color: #f6f0e4;
      font: 700 82px/.93 "Cormorant", serif;
      letter-spacing: -.025em;
      text-wrap: balance;
    }

    .mirage {
      margin: 34px 0 0;
      color: #dcecff;
      font: 400 italic 67px/1 "Cormorant", serif;
      letter-spacing: -.018em;
    }

    .premise {
      display: none;
    }

    .release {
      position: absolute;
      z-index: 2;
      left: 82px;
      right: 110px;
      top: 956px;
      color: rgba(246, 240, 228, .94);
      font: 400 34px/1.28 "Cormorant", serif;
    }

    .release em {
      color: #f5d98f;
      font-style: italic;
    }

    .ending {
      display: none;
    }

    .ending strong {
      color: #dbeaff;
      font-weight: 400;
    }

    .brand {
      position: absolute;
      z-index: 3;
      right: 82px;
      bottom: 35px;
      display: flex;
      align-items: center;
      gap: 18px;
      color: rgba(226, 203, 143, .88);
      font: 400 14px/1 "Source", serif;
      letter-spacing: .13em;
    }

    .brand img {
      width: 122px;
      height: 31px;
      object-fit: contain;
      object-position: right center;
      filter: sepia(1) saturate(.75) brightness(1.22);
      opacity: .9;
    }
  </style>
</head>
<body>
  <main class="poster">
    <img class="art" src="background.png" alt="">
    <div class="veil"></div>

    <section class="copy">
      <h1>Feels like your business is growing too slow?</h1>
      <p class="mirage">What if it’s a mirage?</p>
    </section>

    <p class="release">Paradoxically, the only way to speed up<br>is to accept you can’t forcefully speed up.<br><br><em>Acceleration comes through clarity which is effortless.</em></p>

    <div class="brand">
      <span>findyourtoptalent.com</span>
      <img src="../../../../../src/assets/you-be-original-lockup.webp" alt="YOU — be original.">
    </div>
  </main>
</body>
</html>
