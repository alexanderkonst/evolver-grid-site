<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    @font-face {
      font-family: "Cormorant";
      src: url("../../../../../../../public/fonts/CormorantGaramond-Bold.ttf");
      font-weight: 700;
    }
    @font-face {
      font-family: "Source";
      src: url("../../../../../../../public/fonts/SourceSerif4-Regular.ttf");
    }
    * { box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1350px;
      margin: 0;
      overflow: hidden;
      background: #020306;
    }
    main {
      position: relative;
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #020306;
      color: #f5f0e7;
    }
    .art {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .veil {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(0, 2, 5, .26) 0%, rgba(0, 2, 5, .08) 55%, transparent 100%),
        linear-gradient(180deg, transparent 72%, rgba(0, 2, 5, .34));
    }
    .number {
      position: absolute;
      z-index: 2;
      top: 70px;
      left: 76px;
      color: #d8b65e;
      font: 400 17px/1 "Source", serif;
      letter-spacing: .26em;
    }
    h1 {
      position: absolute;
      z-index: 2;
      top: 120px;
      left: 76px;
      width: 680px;
      margin: 0;
      color: #f6f0e6;
      font: 700 82px/.93 "Cormorant", serif;
      letter-spacing: -.028em;
      text-wrap: balance;
    }
    h1 em {
      color: #dcecff;
      font-style: normal;
    }
    .nowrap { white-space: nowrap; }
    .brand {
      position: absolute;
      z-index: 3;
      left: 76px;
      right: 76px;
      bottom: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 18px;
      border-top: 1px solid rgba(215, 181, 92, .42);
      color: rgba(229, 209, 155, .9);
      font: 400 15px/1 "Source", serif;
      letter-spacing: .12em;
    }
    .brand img {
      width: 145px;
      height: 36px;
      object-fit: contain;
      object-position: left center;
      filter: sepia(1) saturate(.72) brightness(1.2);
      opacity: .92;
    }
  </style>
</head>
<body>
  <main>
    <img class="art" src="background.png" alt="">
    <div class="veil"></div>
    <div class="number">START · 04</div>
    <h1>So everyone optimizes the <em>outside.</em><br><br>Resume, niche, funnel.<br><em>All downstream.</em></h1>
    <div class="brand">
      <img src="../../../../../../../src/assets/you-be-original-lockup.webp" alt="YOU — be original.">
      <span>findyourtoptalent.com</span>
    </div>
  </main>
</body>
</html>
